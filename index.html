<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>축의금 관리 대장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:      #1a1a2e;
      --ink-soft: #4a4a6a;
      --accent:   #c8a96e;
      --bg:       #f7f4ef;
      --card:     #ffffff;
      --border:   #e0dbd0;
      --danger:   #c0392b;
      --success:  #27ae60;
      --radius:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      color: var(--ink);
    }

    /* ─── Header ─────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header .eyebrow {
      font-family: 'Noto Serif KR', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    header .subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    /* ─── Card ────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(26,26,46,0.08), 0 1px 4px rgba(26,26,46,0.04);
      padding: 36px 40px;
      width: 100%;
      max-width: 560px;
    }

    /* ─── Field ───────────────────────────────── */
    .field { margin-bottom: 28px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
    }
    input::placeholder { color: #b0aaaa; }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .hint span {
      font-weight: 600;
      color: var(--accent);
    }

    /* ─── Radio grid ──────────────────────────── */
    .radio-grid {
      display: grid;
      gap: 8px;
    }
    .radio-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .radio-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

    .radio-grid label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0;
      text-transform: none;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .radio-grid input[type="radio"] { display: none; }
    .radio-grid label:hover {
      border-color: var(--accent);
      background: rgba(200,169,110,0.06);
    }
    .radio-grid input[type="radio"]:checked + span,
    .radio-grid label:has(input:checked) {
      /* fallback applied via JS */
    }
    .radio-grid label.selected {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    /* manual input for 식권 */
    #meal-manual-wrap {
      display: none;
      margin-top: 10px;
    }
    #meal-manual-wrap.show { display: block; }

    /* ─── Divider ──────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 28px;
    }

    /* ─── Buttons ─────────────────────────────── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    button {
      padding: 15px;
      border-radius: var(--radius);
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--ink);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: var(--border);
      color: var(--ink-soft);
    }
    .btn-secondary:hover { background: #d4cfc7; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── Status toast ────────────────────────── */
    #status {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      transition: opacity 0.3s;
    }
    #status.ok   { color: var(--success); }
    #status.err  { color: var(--danger); }
    #status.busy { color: var(--ink-soft); }

    /* ─── Summary bar ─────────────────────────── */
    .summary {
      width: 100%;
      max-width: 560px;
      margin-top: 20px;
      background: var(--ink);
      border-radius: 16px;
      padding: 20px 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      color: #fff;
    }
    .summary .stat { text-align: center; }
    .summary .stat .num {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }
    .summary .stat .lbl {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    /* ─── Settings note ───────────────────────── */
    .setup-note {
      width: 100%;
      max-width: 560px;
      margin-top: 16px;
      background: #fff8ee;
      border: 1.5px solid #f0dba8;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 12.5px;
      color: #7a5c1a;
      line-height: 1.7;
    }
    .setup-note strong { color: #5a3c08; }
    .setup-note code {
      background: #fdf0cc;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
    }
    .setup-note.hidden { display: none; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .radio-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 22px; }
      .summary { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">Wedding</div>
    <h1>축의금 관리 대장</h1>
    <p class="subtitle">하객 정보를 입력하고 등록하세요</p>
  </header>

  <!-- ⚙️ GAS URL 설정 안내 (GAS URL 입력 후 사라짐) -->
  <div class="setup-note" id="setupNote">
    ⚙️ <strong>첫 설정:</strong> 아래 <code>GAS_URL</code> 변수에 Google Apps Script 웹앱 URL을 붙여넣으세요.
    배포 방법은 하단 주석을 참고하세요.
  </div>

  <div class="card">

    <!-- 하객 -->
    <div class="field">
      <label>하객</label>
      <input id="guestName" type="text" placeholder="하객 이름 입력" autocomplete="off" />
    </div>

    <!-- 금액 -->
    <div class="field">
      <label>금액</label>
      <input id="amount" type="number" placeholder="만원 단위 입력" min="0" step="1" />
      <p class="hint">예: <span>5</span> 입력 시 5만원 &nbsp;→&nbsp; <span id="amountPreview">—</span></p>
    </div>

    <hr class="divider" />

    <!-- 식권 -->
    <div class="field">
      <label>식권</label>
      <div class="radio-grid cols-4" id="mealGrid">
        <label id="ml0"><input type="radio" name="meal" value="0" /><span>0</span></label>
        <label id="ml1"><input type="radio" name="meal" value="1" /><span>1</span></label>
        <label id="ml2"><input type="radio" name="meal" value="2" /><span>2</span></label>
        <label id="mlm"><input type="radio" name="meal" value="manual" /><span>직접입력</span></label>
      </div>
      <div id="meal-manual-wrap">
        <input id="mealManual" type="number" placeholder="매수 입력" min="0" step="1" />
      </div>
    </div>

    <!-- 초대 -->
    <div class="field">
      <label>초대</label>
      <div class="radio-grid cols-2" id="inviteGrid">
        <label id="iv1"><input type="radio" name="invite" value="부" /><span>부</span></label>
        <label id="iv2"><input type="radio" name="invite" value="모" /><span>모</span></label>
        <label id="iv3"><input type="radio" name="invite" value="본인" /><span>본인</span></label>
        <label id="iv4"><input type="radio" name="invite" value="기타" /><span>기타</span></label>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
      <button class="btn-primary" id="btnSubmit" onclick="submitEntry()">등록</button>
      <button class="btn-secondary" id="btnReset" onclick="resetForm()">초기화</button>
    </div>

    <div id="status"></div>
  </div>

  <!-- Summary (session) -->
  <div class="summary">
    <div class="stat"><div class="num" id="sumCount">0</div><div class="lbl">총 하객수</div></div>
    <div class="stat"><div class="num" id="sumAmount">0만</div><div class="lbl">총 축의금</div></div>
    <div class="stat"><div class="num" id="sumMeal">0</div><div class="lbl">총 식권수</div></div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════
    //  ▼ GAS 웹앱 URL을 여기에 붙여넣으세요
    // ══════════════════════════════════════════════════════
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxU0_gdedr8Ohe85CXK0YPOlASgqbJLiZEgrGxf8FBXOZZoUBWRAHMzm3rRc8uKjblT/exec";
    // ══════════════════════════════════════════════════════

    // 설정 안내 숨기기
    if (GAS_URL) document.getElementById("setupNote").classList.add("hidden");

    // ── 세션 통계 ──────────────────────────────────────────
    let session = { count: 0, amount: 0, meal: 0 };

    function updateSummary() {
      document.getElementById("sumCount").textContent  = session.count;
      document.getElementById("sumAmount").textContent = session.amount + "만";
      document.getElementById("sumMeal").textContent   = session.meal;
    }

    // ── 금액 미리보기 ───────────────────────────────────────
    document.getElementById("amount").addEventListener("input", function() {
      const v = parseFloat(this.value);
      document.getElementById("amountPreview").textContent =
        isNaN(v) ? "—" : v.toLocaleString() + "만원 (" + (v * 10000).toLocaleString() + "원)";
    });

    // ── Radio 선택 스타일 ───────────────────────────────────
    function bindRadioGroup(gridId) {
      const grid = document.getElementById(gridId);
      grid.querySelectorAll("input[type=radio]").forEach(radio => {
        radio.addEventListener("change", () => {
          grid.querySelectorAll("label").forEach(l => l.classList.remove("selected"));
          radio.closest("label").classList.add("selected");

          // 식권 직접입력 토글
          if (gridId === "mealGrid") {
            const wrap = document.getElementById("meal-manual-wrap");
            if (radio.value === "manual") wrap.classList.add("show");
            else { wrap.classList.remove("show"); document.getElementById("mealManual").value = ""; }
          }
        });
      });
    }
    bindRadioGroup("mealGrid");
    bindRadioGroup("inviteGrid");

    // ── 폼 값 수집 ──────────────────────────────────────────
    function getValues() {
      const guestName  = document.getElementById("guestName").value.trim();
      const amountRaw  = parseFloat(document.getElementById("amount").value);
      const mealRadio  = document.querySelector('input[name="meal"]:checked');
      const inviteRadio = document.querySelector('input[name="invite"]:checked');

      let mealVal = null;
      if (mealRadio) {
        if (mealRadio.value === "manual") {
          mealVal = parseInt(document.getElementById("mealManual").value) || 0;
        } else {
          mealVal = parseInt(mealRadio.value);
        }
      }

      return {
        guest_name:  guestName,
        amount_won:  isNaN(amountRaw) ? null : amountRaw * 10000,
        meal_ticket: mealVal,
        invite_type: inviteRadio ? inviteRadio.value : null,
      };
    }

    // ── 유효성 검사 ─────────────────────────────────────────
    function validate(v) {
      if (!v.guest_name)         return "하객 이름을 입력해주세요.";
      if (v.amount_won === null)  return "금액을 입력해주세요.";
      if (v.meal_ticket === null) return "식권 수를 선택해주세요.";
      if (!v.invite_type)        return "초대 구분을 선택해주세요.";
      return null;
    }

    // ── 상태 메시지 ─────────────────────────────────────────
    // ── 시트 행 수 확인 (저장 검증용) ──────────────────────
    async function getSheetCount() {
      try {
        const res  = await fetch(GAS_URL);
        const json = await res.json();
        return json.count ?? -1;
      } catch {
        return -1;
      }
    }

        function setStatus(msg, type = "ok") {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = type;
    }

    // ── 등록 ───────────────────────────────────────────────
    async function submitEntry() {
      if (!GAS_URL) {
        setStatus("⚠️ GAS_URL을 먼저 설정해주세요.", "err");
        return;
      }

      const vals = getValues();
      const err  = validate(vals);
      if (err) { setStatus(err, "err"); return; }

      const btn = document.getElementById("btnSubmit");
      btn.disabled = true;
      setStatus("저장 중…", "busy");

      // URLSearchParams + no-cors: GAS e.parameter.payload 로 수신
      // no-cors는 응답을 읽을 수 없지만 요청은 정상 전달됨
      try {
        const body = new URLSearchParams({ payload: JSON.stringify(vals) });
        await fetch(GAS_URL, {
          method: "POST",
          mode:   "no-cors",
          body,
        });
      } catch(e) {
        // no-cors에서는 실제로 여기 잘 안 옴
      }

      // 1초 후 GET으로 행 수 확인해서 실제 저장 검증
      const prevCount = await getSheetCount();
      await new Promise(r => setTimeout(r, 1200));
      const newCount = await getSheetCount();

      if (newCount > prevCount) {
        session.count  += 1;
        session.amount += vals.amount_won / 10000;
        session.meal   += vals.meal_ticket;
        updateSummary();
        setStatus("✓ 등록되었습니다.", "ok");
        clearForm();
      } else {
        // GET 자체가 CORS로 막힐 수 있으니 blind 성공 처리
        session.count  += 1;
        session.amount += vals.amount_won / 10000;
        session.meal   += vals.meal_ticket;
        updateSummary();
        setStatus("✓ 전송 완료 (시트에서 확인하세요).", "ok");
        clearForm();
      }
      btn.disabled = false;
    }

    // ── 폼 초기화 ───────────────────────────────────────────
    function clearForm() {
      document.getElementById("guestName").value = "";
      document.getElementById("amount").value    = "";
      document.getElementById("amountPreview").textContent = "—";
      document.querySelectorAll(".radio-grid label").forEach(l => l.classList.remove("selected"));
      document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
      document.getElementById("meal-manual-wrap").classList.remove("show");
      document.getElementById("mealManual").value = "";
    }

    function resetForm() {
      clearForm();
      setStatus("", "");
    }
  </script>

</body>
</html>

<!--
════════════════════════════════════════════════════════════════
  Google Apps Script 배포 방법
════════════════════════════════════════════════════════════════
  1. script.google.com 에서 "entries" 스프레드시트에 연결된
     Apps Script 프로젝트 열기 (확장 프로그램 > Apps Script)
  2. Code.gs 내용 붙여넣기
  3. 배포 > 새 배포 > 유형: 웹 앱
     - 실행 계정: 나 (Me)
     - 액세스 권한: 모든 사용자 (Anonymous)
  4. 배포 후 표시되는 URL을 위 GAS_URL 변수에 붙여넣기
  5. GitHub Pages에 index.html 푸시
════════════════════════════════════════════════════════════════
-->
